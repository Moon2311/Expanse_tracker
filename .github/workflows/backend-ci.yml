# Pushes images with the repo's GITHUB_TOKEN (no secret to add in .env).
# Optional: set repository Actions permission "packages: write" if pushes fail.
name: Backend CI & Docker image

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spendly_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-prod.txt

      - name: Migrate, check, collectstatic
        env:
          DJANGO_SECRET_KEY: ci-not-for-production
          DJANGO_DEBUG: "0"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: spendly_ci
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python manage.py migrate --noinput
          python manage.py check
          python manage.py collectstatic --noinput

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Lowercase owner (GHCR)
        id: image
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/spendly-backend:latest
            ghcr.io/${{ steps.image.outputs.owner }}/spendly-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
