# Requires an Ingress controller (e.g. nginx-ingress, Traefik).
# Adjust host, TLS secret, and ingressClassName for your cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spendly-backend
  namespace: spendly
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spendly-backend
                port:
                  number: 80
  # tls:
