# Copy to backend-secret.yaml, fill values (same names as backend/.env.example),
# then: kubectl apply -f backend-secret.yaml
#
# Local reference: ../../backend/.env.example and repo root .env.example
apiVersion: v1
kind: Secret
metadata:
  name: spendly-backend-env
  namespace: spendly
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "replace-with-long-random-string"
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "api.example.com,localhost"
  DB_NAME: "spendly"
  DB_USER: "spendly"
  DB_PASSWORD: "replace-me"
  DB_HOST: "postgres.spendly.svc.cluster.local"
  DB_PORT: "5432"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
  JWT_ACCESS_MINUTES: "60"
